services:
  db:
    image: postgres:16-alpine
    container_name: aristokrat-db
    environment:
      - POSTGRES_DB=aristokrat
      - POSTGRES_USER=aristokrat
      - POSTGRES_PASSWORD=aristokrat
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - aristokrat-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aristokrat-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    environment:
      - DATABASE_URL=postgresql+psycopg2://aristokrat:aristokrat@db:5432/aristokrat
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - aristokrat-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aristokrat-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - aristokrat-network

networks:
  aristokrat-network:
    driver: bridge

volumes:
  postgres-data:

